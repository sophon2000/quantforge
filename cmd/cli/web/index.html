<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuantForge 回测可视化</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #eee; }
    #toolbar { padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; background: #16213e; }
    #toolbar label { display: flex; align-items: center; gap: 6px; }
    #toolbar input, #toolbar select { padding: 6px 10px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #eee; }
    #toolbar button { padding: 8px 16px; background: #e94560; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-weight: 600; }
    #toolbar button:hover { background: #ff6b6b; }
    #summary { padding: 8px 16px; font-size: 13px; color: #a0a0a0; }
    #main { width: 100%; height: 55vh; min-height: 360px; }
    .error { color: #e94560; padding: 8px 16px; }
    #signals-section { padding: 0 16px 16px; }
    #signals-section h3 { margin: 12px 0 8px; font-size: 14px; color: #a0a0a0; font-weight: 600; }
    #signals-list { width: 100%; border-collapse: collapse; font-size: 13px; background: #16213e; border-radius: 8px; overflow: hidden; }
    #signals-list th, #signals-list td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #0f3460; }
    #signals-list th { color: #a0a0a0; font-weight: 600; }
    #signals-list tr:last-child td { border-bottom: none; }
    #signals-list .type-buy { color: #00da3c; }
    #signals-list .type-sell { color: #ec0000; }
    #signals-list .return-pct { font-weight: 600; }
    #signals-list .return-pct.positive { color: #00da3c; }
    #signals-list .return-pct.negative { color: #ec0000; }
    #signals-wrapper { max-height: 32vh; overflow-y: auto; }
    #signals-list th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
    #signals-list th.sortable:hover { color: #e94560; }
    #signals-list th .sort-indicator { margin-left: 4px; opacity: 0.6; font-size: 11px; }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>标的 <input type="text" id="symbol" value="AAPL" placeholder="AAPL"></label>
    <label>策略
      <select id="strategy">
        <option value="bollinger">布林带突破</option>
        <option value="bollinger-mean-reversion">布林带均值回归</option>
        <option value="macd">MACD 金叉死叉</option>
        <option value="macd-histogram">MACD 柱状图</option>
        <option value="rsi">RSI 超买超卖</option>
        <option value="rsi-divergence">RSI 背离</option>
        <option value="kdj-crossover">KDJ 金叉死叉</option>
        <option value="kdj-extreme">KDJ 超买超卖</option>
        <option value="multi-indicator">多指标组合</option>
        <option value="trend-following">趋势跟踪</option>
      </select>
    </label>
    <label>初始资金 <input type="number" id="cash" value="100000" min="1000" step="10000"></label>
    <label>每笔数量 <input type="number" id="quantity" value="100" min="1"></label>
    <button id="run">运行回测</button>
  </div>
  <div id="summary"></div>
  <div id="error" class="error"></div>
  <div id="main"></div>
  <div id="signals-section">
    <h3>信号列表</h3>
    <div id="signals-wrapper">
      <table id="signals-list">
        <thead><tr>
          <th>#</th>
          <th class="sortable" data-sort="date">日期 <span class="sort-indicator"></span></th>
          <th>类型</th>
          <th class="sortable" data-sort="price">价格 <span class="sort-indicator"></span></th>
          <th class="sortable" data-sort="returnPct">收益率 <span class="sort-indicator"></span></th>
        </tr></thead>
        <tbody id="signals-tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const upColor = '#ec0000';
    const upBorderColor = '#8A0000';
    const downColor = '#00da3c';
    const downBorderColor = '#008F28';

    let chartDom = document.getElementById('main');
    let myChart = echarts.init(chartDom);

    const strategyDisplayNames = {
      'bollinger': '布林带突破',
      'bollinger-mean-reversion': '布林带均值回归',
      'macd': 'MACD 金叉死叉',
      'macd-histogram': 'MACD 柱状图',
      'rsi': 'RSI 超买超卖',
      'rsi-divergence': 'RSI 背离',
      'kdj-crossover': 'KDJ 金叉死叉',
      'kdj-extreme': 'KDJ 超买超卖',
      'multi-indicator': '多指标组合',
      'trend-following': '趋势跟踪'
    };

    function getApiBase() {
      return window.location.origin;
    }

    function buildOption(data) {
      const categoryData = data.categoryData || [];
      const values = data.values || [];
      const signals = data.signals || [];
      const ma5 = data.ma5 || [];
      const ma10 = data.ma10 || [];
      const ma20 = data.ma20 || [];
      const ma30 = data.ma30 || [];
      const bollUpper = data.bollUpper || [];
      const bollMiddle = data.bollMiddle || [];
      const bollLower = data.bollLower || [];
      const volumes = data.volumes || [];
      const macdDIF = (data.macdDIF || []).map(v => (v === '-' || v == null) ? null : Number(v));
      const macdDEA = (data.macdDEA || []).map(v => (v === '-' || v == null) ? null : Number(v));
      const macdHist = (data.macdHist || []).map(v => (v === '-' || v == null) ? null : Number(v));
      const macdHistBarData = macdHist.map(v => v == null ? null : { value: v, itemStyle: { color: v >= 0 ? upColor : downColor } });
      // 成交量柱：涨红跌绿
      const volumeBarData = values.map((v, i) => ({
        value: volumes[i] || 0,
        itemStyle: { color: (v[1] >= v[0]) ? upColor : downColor }
      }));

      // 与图表 markPoint 使用同一份列表，只取有效项（有 date、price、type）
      const validSignals = signals.filter(s => s && (s.type === 'BUY' || s.type === 'SELL') && s.date != null && typeof s.price === 'number');
      const buyPoints = validSignals.filter(s => s.type === 'BUY').map(s => ({
        name: '买',
        coord: [s.date, s.price],
        value: s.price.toFixed(2),
        itemStyle: { color: downColor }
      }));
      const sellPoints = validSignals.filter(s => s.type === 'SELL').map(s => ({
        name: '卖',
        coord: [s.date, s.price],
        value: s.price.toFixed(2),
        itemStyle: { color: upColor }
      }));

      return {
        _signalsForList: validSignals,
        title: {
          text: data.symbol + ' - ' + (strategyDisplayNames[data.strategy] || data.strategy) + ' 回测',
          left: 0,
          textStyle: { color: '#eee' }
        },
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'cross' },
          backgroundColor: 'rgba(22,33,62,0.95)',
          borderColor: '#0f3460',
          textStyle: { color: '#eee' }
        },
        legend: {
          data: ['日K', 'MA5', 'MA10', 'MA20', 'MA30', 'BOLL上', 'BOLL中', 'BOLL下', '成交量', 'DIF', 'DEA', 'MACD'],
          top: 28,
          textStyle: { color: '#a0a0a0' }
        },
        grid: [
          { left: '10%', right: '10%', bottom: 230 },
          { left: '10%', right: '10%', height: 80, bottom: 145 },
          { left: '10%', right: '10%', height: 100, bottom: 40 }
        ],
        xAxis: [
          {
            type: 'category',
            data: categoryData,
            boundaryGap: false,
            axisLine: { onZero: false, lineStyle: { color: '#0f3460' } },
            axisLabel: { color: '#a0a0a0' },
            splitLine: { show: false }
          },
          {
            type: 'category',
            data: categoryData,
            gridIndex: 1,
            boundaryGap: false,
            axisLine: { onZero: false, lineStyle: { color: '#0f3460' } },
            axisTick: { show: false },
            axisLabel: { show: false },
            splitLine: { show: false }
          },
          {
            type: 'category',
            data: categoryData,
            gridIndex: 2,
            boundaryGap: false,
            axisLine: { onZero: false, lineStyle: { color: '#0f3460' } },
            axisTick: { show: false },
            axisLabel: { show: false },
            splitLine: { show: false }
          }
        ],
        yAxis: [
          {
            scale: true,
            splitArea: { show: true, areaStyle: { color: ['rgba(15,52,96,0.3)', 'rgba(15,52,96,0.1)'] } },
            splitLine: { lineStyle: { color: '#0f3460' } },
            axisLabel: { color: '#a0a0a0' }
          },
          {
            scale: true,
            gridIndex: 1,
            splitNumber: 2,
            axisLabel: { show: false },
            axisLine: { show: false },
            axisTick: { show: false },
            splitLine: { show: false }
          },
          {
            scale: true,
            gridIndex: 2,
            splitNumber: 2,
            axisLine: { show: false },
            axisTick: { show: false },
            splitLine: { lineStyle: { color: '#0f3460', type: 'dashed' } },
            axisLabel: { color: '#a0a0a0', fontSize: 10 }
          }
        ],
        dataZoom: [
          { type: 'inside', xAxisIndex: [0, 1, 2], start: 50, end: 100 },
          { show: true, type: 'slider', xAxisIndex: [0, 1, 2], bottom: 5, start: 50, end: 100, borderColor: '#0f3460', fillerColor: 'rgba(233,69,96,0.2)', handleStyle: { color: '#e94560' }, textStyle: { color: '#a0a0a0' } }
        ],
        series: [
          {
            name: '日K',
            type: 'candlestick',
            data: values,
            itemStyle: {
              color: upColor,
              color0: downColor,
              borderColor: upBorderColor,
              borderColor0: downBorderColor
            },
            markPoint: {
              symbol: 'pin',
              symbolSize: 40,
              label: { fontSize: 11 },
              data: [...buyPoints, ...sellPoints]
            }
          },
          { name: 'MA5', type: 'line', data: ma5, smooth: true, lineStyle: { opacity: 0.6 }, itemStyle: { color: '#7b68ee' } },
          { name: 'MA10', type: 'line', data: ma10, smooth: true, lineStyle: { opacity: 0.6 }, itemStyle: { color: '#20b2aa' } },
          { name: 'MA20', type: 'line', data: ma20, smooth: true, lineStyle: { opacity: 0.6 }, itemStyle: { color: '#ffa500' } },
          { name: 'MA30', type: 'line', data: ma30, smooth: true, lineStyle: { opacity: 0.6 }, itemStyle: { color: '#da70d6' } },
          { name: 'BOLL上', type: 'line', data: bollUpper, smooth: true, lineStyle: { opacity: 0.8, type: 'dashed' }, itemStyle: { color: '#ff6b9d' } },
          { name: 'BOLL中', type: 'line', data: bollMiddle, smooth: true, lineStyle: { opacity: 0.8 }, itemStyle: { color: '#c0c0c0' } },
          { name: 'BOLL下', type: 'line', data: bollLower, smooth: true, lineStyle: { opacity: 0.8, type: 'dashed' }, itemStyle: { color: '#4ecdc4' } },
          {
            name: '成交量',
            type: 'bar',
            xAxisIndex: 1,
            yAxisIndex: 1,
            data: volumeBarData,
            large: true
          },
          { name: 'DIF', type: 'line', xAxisIndex: 2, yAxisIndex: 2, data: macdDIF, smooth: true, lineStyle: { width: 1.5 }, itemStyle: { color: '#7b68ee' } },
          { name: 'DEA', type: 'line', xAxisIndex: 2, yAxisIndex: 2, data: macdDEA, smooth: true, lineStyle: { width: 1.5 }, itemStyle: { color: '#ffa500' } },
          {
            name: 'MACD',
            type: 'bar',
            xAxisIndex: 2,
            yAxisIndex: 2,
            data: macdHistBarData,
            barMaxWidth: 6
          }
        ]
      };
    }

    function showSummary(summary) {
      const el = document.getElementById('summary');
      if (!summary) { el.textContent = ''; return; }
      el.innerHTML = 'K线数: ' + (summary.barCount || '-') +
        ' | 信号笔数: ' + (summary.tradeCount ?? '-') +
        ' | 初始资金: ' + (summary.initialCash != null ? summary.initialCash.toFixed(2) : '-') +
        ' | 期末现金: ' + (summary.finalCash != null ? summary.finalCash.toFixed(2) : '-') +
        ' | 收益率: ' + (summary.returnPct != null ? summary.returnPct.toFixed(2) + '%' : '-') +
        ' | 成功率: ' + (summary.successPct != null ? summary.successPct.toFixed(2) + '%' : '-') +
        ' | 持仓: ' + (summary.position ?? '-');
    }

    function setError(msg) {
      document.getElementById('error').textContent = msg || '';
    }

    let currentSignals = [];
    let sortKey = 'date';
    let sortDir = 1; // 1 升序, -1 降序

    function compareSignals(a, b) {
      let va = a[sortKey], vb = b[sortKey];
      if (sortKey === 'date') {
        // 按真实时间排序，避免 "2014/12/8" 被字符串排到 "2014/12/31" 后面
        const ta = new Date(String(va).replace(/\//g, '-')).getTime();
        const tb = new Date(String(vb).replace(/\//g, '-')).getTime();
        if (!isNaN(ta) && !isNaN(tb)) return sortDir * (ta - tb);
        return sortDir * (String(va).localeCompare(String(vb)));
      }
      if (sortKey === 'price') {
        return sortDir * (Number(va) - Number(vb));
      }
      if (sortKey === 'returnPct') {
        // 只排 SELL（有 returnPct 的）；无收益率的（—）统一排在最后
        const hasA = a.type === 'SELL' && (va != null && va !== '');
        const hasB = b.type === 'SELL' && (vb != null && vb !== '');
        if (!hasA && !hasB) return 0;
        if (!hasA) return 1;   // a 无收益率，a 排后面
        if (!hasB) return -1;  // b 无收益率，b 排后面
        return sortDir * (Number(va) - Number(vb));
      }
      return 0;
    }

    function updateSortIndicators() {
      document.querySelectorAll('#signals-list th.sortable').forEach(function(th) {
        const ind = th.querySelector('.sort-indicator');
        if (!ind) return;
        if (th.dataset.sort === sortKey) {
          ind.textContent = sortDir === 1 ? '↑' : '↓';
          ind.style.opacity = '1';
        } else {
          ind.textContent = '';
          ind.style.opacity = '0.6';
        }
      });
    }

    function showSignalsList(signals) {
      currentSignals = Array.isArray(signals) ? signals : [];
      const sorted = currentSignals.slice().sort(compareSignals);
      const tbody = document.getElementById('signals-tbody');
      tbody.innerHTML = '';
      if (sorted.length === 0) return;
      updateSortIndicators();
      sorted.forEach((s, i) => {
        const tr = document.createElement('tr');
        const typeCls = (s && s.type === 'BUY') ? 'type-buy' : 'type-sell';
        const dateStr = (s && s.date != null) ? String(s.date) : '—';
        const priceNum = (s && typeof s.price === 'number') ? s.price : NaN;
        const priceStr = Number.isFinite(priceNum) ? priceNum.toFixed(2) : '—';
        let returnHtml = '—';
        if (s && s.type === 'SELL' && s.returnPct != null && typeof s.returnPct === 'number') {
          const cls = s.returnPct >= 0 ? 'return-pct positive' : 'return-pct negative';
          returnHtml = '<span class="' + cls + '">' + s.returnPct.toFixed(2) + '%</span>';
        }
        tr.innerHTML = '<td>' + (i + 1) + '</td><td>' + dateStr + '</td><td class="' + typeCls + '">' + (s && s.type ? s.type : '—') + '</td><td>' + priceStr + '</td><td>' + returnHtml + '</td>';
        tbody.appendChild(tr);
      });
    }

    document.getElementById('signals-list').addEventListener('click', function(e) {
      const th = e.target.closest('th.sortable');
      if (!th) return;
      const key = th.dataset.sort;
      if (key === sortKey) sortDir = -sortDir; else { sortKey = key; sortDir = 1; }
      showSignalsList(currentSignals);
    });

    async function runBacktest() {
      const symbol = document.getElementById('symbol').value.trim() || 'AAPL';
      const strategy = document.getElementById('strategy').value;
      const cash = Number(document.getElementById('cash').value) || 100000;
      const quantity = Number(document.getElementById('quantity').value) || 100;
      setError('');

      const url = getApiBase() + '/api/backtest?symbol=' + encodeURIComponent(symbol) + '&strategy=' + encodeURIComponent(strategy) + '&cash=' + cash + '&quantity=' + quantity;
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.error) {
          setError(data.error);
          return;
        }
        const option = buildOption(data);
        myChart.setOption(option, true);
        const s = data.summary || {};
        showSummary({
          barCount: data.categoryData ? data.categoryData.length : 0,
          tradeCount: s.tradeCount,
          initialCash: s.initialCash,
          finalCash: s.finalCash,
          returnPct: s.returnPct,
          position: s.position,
          successPct: s.successPct
        });
        // 与 markPoint 使用同一份数据，保证列表条数一致
        showSignalsList(option._signalsForList != null ? option._signalsForList : (data.signals || []));
      } catch (e) {
        setError('请求失败: ' + e.message);
      }
    }

    document.getElementById('run').addEventListener('click', runBacktest);
    window.addEventListener('resize', function() { myChart.resize(); });

    // 默认加载一次
    runBacktest();
  </script>
</body>
</html>
